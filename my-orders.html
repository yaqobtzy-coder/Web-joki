<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pesanan Saya | Bizzy Impact Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style id="theme-style">
        :root {
            --primary-color: #1e88e5;
            --primary-dark: #0d47a1;
            --primary-light: #42a5f5;
            --accent-color: #ffd700;
            --accent-dark: #ff8c00;
            --bg-light: #ffffff;
            --bg-card: rgba(255,255,255,0.8);
            --text-dark: #1a2a6c;
            --text-light: #2c3e8f;
        }
    </style>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #e6edfc);
            color: var(--text-dark);
            min-height: 100vh;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.3);
            z-index: -1;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(30,136,229,0.3);
        }
        .header h1 {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Bot Status Bar */
        .bot-status-bar {
            background: rgba(0,0,0,0.05);
            border-radius: 30px;
            padding: 8px 16px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
        }
        .bot-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .status-dot.online { background: #28a745; box-shadow: 0 0 5px #28a745; }
        .status-dot.offline { background: #dc3545; }
        .bot-command-badge {
            background: rgba(0,0,0,0.05);
            padding: 4px 10px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.65rem;
            cursor: pointer;
        }
        .bot-command-badge:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .order-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid rgba(30,136,229,0.2);
            transition: 0.2s;
        }
        .order-card.pending { border-left: 4px solid var(--accent-color); }
        .order-card.processing { border-left: 4px solid #17a2b8; }
        .order-card.completed { border-left: 4px solid #28a745; }
        .order-card.cancelled { border-left: 4px solid #dc3545; }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .order-product {
            font-size: 1rem;
            font-weight: bold;
            color: var(--primary-dark);
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .status-pending { background: var(--accent-color); color: #1a1a2e; }
        .status-processing { background: #17a2b8; color: white; }
        .status-completed { background: #28a745; color: white; }
        .status-cancelled { background: #dc3545; color: white; }
        .order-details {
            font-size: 0.75rem;
            opacity: 0.85;
            margin-top: 10px;
        }
        .order-details p { margin: 6px 0; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 5px; }
        .order-details .label { opacity: 0.6; }
        .order-details .value { font-weight: 500; color: var(--primary-color); }
        .history-id { font-family: monospace; font-size: 0.7rem; }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--primary-color);
            border-radius: 40px;
            font-weight: 600;
            color: var(--primary-color);
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-refresh {
            background: rgba(30,136,229,0.1);
            border: 1px solid var(--primary-color);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: var(--primary-color);
            cursor: pointer;
            margin-bottom: 15px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
        }
        .empty-state i { font-size: 3rem; opacity: 0.3; margin-bottom: 16px; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(30,136,229,0.3);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        footer { text-align: center; padding: 20px; font-size: 0.7rem; opacity: 0.5; }
        .auto-refresh-info { text-align: center; font-size: 0.65rem; opacity: 0.5; margin-bottom: 15px; }
        .queue-badge-small {
            background: var(--accent-color);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            color: #1a1a2e;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--bg-light);
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            z-index: 2000;
            border-left: 4px solid var(--primary-color);
            color: var(--primary-dark);
        }
        .bot-command-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
        }
        .bot-cmd {
            background: rgba(0,0,0,0.05);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
        }
        .bot-cmd:hover {
            background: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-box"></i> Pesanan Saya</h1>
            <p>Riwayat dan status pesanan joki Anda</p>
        </div>

        <!-- Bot Status Bar -->
        <div class="bot-status-bar">
            <div class="bot-status">
                <span class="status-dot online" id="botStatusDot"></span>
                <span id="botStatusText"><i class="fab fa-telegram"></i> Bizzy Impact Bot</span>
            </div>
            <div class="bot-command-badge" onclick="openBot()">
                <i class="fab fa-telegram"></i> @BizzyImpactBot
            </div>
        </div>

        <div class="auto-refresh-info">
            <i class="fas fa-sync-alt"></i> Data otomatis update setiap 10 detik
            <button class="btn-refresh" onclick="manualRefresh()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>

        <div id="ordersList"></div>

        <!-- Info Bot Commands -->
        <div style="background: rgba(0,0,0,0.03); border-radius: 20px; padding: 16px; margin-top: 15px; text-align: center;">
            <p><i class="fab fa-telegram"></i> <strong>Cek status via Bot Telegram</strong></p>
            <div class="bot-command-list">
                <div class="bot-cmd" onclick="copyCommand('/cek_antrian')">/cek_antrian</div>
                <div class="bot-cmd" onclick="copyCommand('/data_akun')">/data_akun</div>
                <div class="bot-cmd" onclick="copyCommand('/laporan')">/laporan</div>
                <div class="bot-cmd" onclick="copyCommand('/help')">/help</div>
            </div>
            <p style="font-size: 0.65rem; margin-top: 10px;">Klik command untuk menyalin</p>
        </div>

        <button class="btn-secondary" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Kembali ke Beranda
        </button>

        <footer>
            <i class="fas fa-shield-alt"></i> Bizzy Impact Official
        </footer>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top:20px;">Memuat pesanan...</p>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyBUHSGJ2Yaet7ue1x8WLcHn6LI627SINqg",
            authDomain: "rayy-digital-store.firebaseapp.com",
            databaseURL: "https://rayy-digital-store-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rayy-digital-store",
            storageBucket: "rayy-digital-store.firebasestorage.app",
            messagingSenderId: "537690791174",
            appId: "1:537690791174:web:c29f7cdfcae0506b6e1287"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function loadCustomTheme() {
            const themeRef = ref(db, 'bizzy_settings/theme');
            const snapshot = await get(themeRef);
            const theme = snapshot.val();
            if (theme) {
                const styleTag = document.getElementById('theme-style');
                if (styleTag) {
                    styleTag.innerHTML = `
                        :root {
                            --primary-color: ${theme.primaryColor || '#1e88e5'};
                            --primary-dark: ${theme.primaryDark || '#0d47a1'};
                            --primary-light: ${theme.primaryLight || '#42a5f5'};
                            --accent-color: ${theme.accentColor || '#ffd700'};
                            --accent-dark: ${theme.accentDark || '#ff8c00'};
                            --bg-light: #ffffff;
                            --bg-card: rgba(255,255,255,0.8);
                            --text-dark: #1a2a6c;
                            --text-light: #2c3e8f;
                        }
                    `;
                }
            }
        }

        // Load bot status
        async function loadBotStatus() {
            const botConfigRef = ref(db, 'bizzy_settings/bot_config');
            const snapshot = await get(botConfigRef);
            const config = snapshot.val();
            const dot = document.getElementById('botStatusDot');
            const text = document.getElementById('botStatusText');
            
            if (config && config.online) {
                dot.className = 'status-dot online';
                text.innerHTML = '<i class="fab fa-telegram"></i> Bot Online';
            } else {
                dot.className = 'status-dot offline';
                text.innerHTML = '<i class="fab fa-telegram"></i> Bot Offline';
            }
        }

        let currentUserId = localStorage.getItem("bizzy_userId");
        let currentUsername = localStorage.getItem("bizzy_username");
        let refreshInterval = null;

        function showLoading() { document.getElementById('loadingOverlay').classList.add('show'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

        function showToast(msg) {
            let toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function copyCommand(command) {
            navigator.clipboard.writeText(command);
            showToast(`✅ Command ${command} disalin! Gunakan di @BizzyImpactBot`);
        }

        function openBot() {
            window.open('https://t.me/BizzyImpactBot', '_blank');
        }

        function getStatusBadge(status) {
            switch(status) {
                case 'pending': return '<span class="status-badge status-pending">⏳ MENUNGGU KONFIRMASI</span>';
                case 'processing': return '<span class="status-badge status-processing">⚙️ SEDANG DI PROSES</span>';
                case 'completed': return '<span class="status-badge status-completed">✅ SELESAI</span>';
                case 'cancelled': return '<span class="status-badge status-cancelled">❌ DIBATALKAN</span>';
                default: return '<span class="status-badge status-pending">⏳ PENDING</span>';
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'pending': return 'pending';
                case 'processing': return 'processing';
                case 'completed': return 'completed';
                case 'cancelled': return 'cancelled';
                default: return 'pending';
            }
        }

        function getStatusText(status) {
            switch(status) {
                case 'pending': return 'Menunggu Konfirmasi Admin';
                case 'processing': return 'Sedang Dikerjakan oleh Admin';
                case 'completed': return 'Pesanan Selesai! Terima kasih 🙏';
                case 'cancelled': return 'Pesanan Dibatalkan';
                default: return 'Menunggu Konfirmasi';
            }
        }

        async function loadOrders() {
            if (!currentUserId) {
                document.getElementById('ordersList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-lock"></i>
                        <p>Silakan login terlebih dahulu untuk melihat pesanan Anda</p>
                        <button class="btn-secondary" onclick="window.location.href='index.html'">Login Sekarang</button>
                    </div>
                `;
                return;
            }

            showLoading();
            try {
                const ordersRef = ref(db, 'bizzy_orders');
                const snapshot = await get(ordersRef);
                const orders = snapshot.val();

                if (!orders) {
                    document.getElementById('ordersList').innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>Belum ada pesanan</p><button class="btn-secondary" onclick="window.location.href='index.html'">Order Sekarang</button></div>`;
                    hideLoading();
                    return;
                }

                const userOrders = Object.entries(orders).filter(([id, order]) => order.userId === currentUserId).sort((a,b) => new Date(b[1].createdAt) - new Date(a[1].createdAt));

                if (userOrders.length === 0) {
                    document.getElementById('ordersList').innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>Belum ada pesanan</p><button class="btn-secondary" onclick="window.location.href='index.html'">Order Sekarang</button></div>`;
                    hideLoading();
                    return;
                }

                let html = '';
                for (const [id, order] of userOrders) {
                    const statusClass = getStatusClass(order.status);
                    const statusBadge = getStatusBadge(order.status);
                    const statusText = getStatusText(order.status);
                    
                    let queueHtml = '';
                    if (order.queueNumber) {
                        queueHtml = `<span class="queue-badge-small"><i class="fas fa-hourglass-half"></i> Antrian ke-${order.queueNumber}</span>`;
                    }
                    
                    html += `
                        <div class="order-card ${statusClass}">
                            <div class="order-header">
                                <span class="order-product"><i class="fas fa-gamepad"></i> ${escapeHtml(order.productName)}</span>
                                <div style="display: flex; gap: 8px; align-items: center;">${queueHtml}${statusBadge}</div>
                            </div>
                            <div class="order-details">
                                <p><span class="label">📅 Tanggal Order:</span> <span class="value">${new Date(order.createdAt).toLocaleString()}</span></p>
                                <p><span class="label">💰 Total Bayar:</span> <span class="value">Rp ${order.productPrice?.toLocaleString() || 0}</span></p>
                                <p><span class="label">🆔 ID Transaksi:</span> <span class="value history-id">${order.transactionId || '-'}</span></p>
                                <p><span class="label">📱 WhatsApp:</span> <span class="value">${escapeHtml(order.phoneNumber || '-')}</span></p>
                                <p><span class="label">📊 Status:</span> <span class="value">${statusText}</span></p>
                                ${order.proofLink ? `<p><span class="label">🔗 Bukti Transfer:</span> <span class="value"><a href="${escapeHtml(order.proofLink)}" target="_blank" style="color:var(--primary-color);">Lihat Bukti</a></span></p>` : ''}
                                ${order.processedBy ? `<p><span class="label">👨‍💼 Diproses oleh:</span> <span class="value">${escapeHtml(order.processedBy)}</span></p>` : ''}
                            </div>
                        </div>
                    `;
                }
                document.getElementById('ordersList').innerHTML = html;
            } catch (error) {
                document.getElementById('ordersList').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Gagal memuat pesanan</p><button class="btn-secondary" onclick="location.reload()">Coba Lagi</button></div>`;
            } finally {
                hideLoading();
            }
        }

        function manualRefresh() { showToast("🔄 Memuat ulang data..."); loadOrders(); }
        function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        function goBack() { window.location.href = 'index.html'; }

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => { if (currentUserId) loadOrders(); }, 10000);
        }

        await loadCustomTheme();
        await loadBotStatus();

        if (!currentUserId || !currentUsername) {
            document.getElementById('ordersList').innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><p>Silakan login terlebih dahulu</p><button class="btn-secondary" onclick="window.location.href='index.html'">Login Sekarang</button></div>`;
        } else {
            loadOrders();
            startAutoRefresh();
        }

        window.goBack = goBack;
        window.manualRefresh = manualRefresh;
        window.copyCommand = copyCommand;
        window.openBot = openBot;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pesanan Saya | Bizzy Impact Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #0f0f2a);
            color: #ffffff;
            min-height: 100vh;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10,10,30,0.85), rgba(0,0,0,0.92));
            z-index: -1;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a3a, #0f0f2a);
            border-radius: 30px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .header h1 {
            background: linear-gradient(135deg, #FFD966, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .order-card {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,215,0,0.2);
            transition: 0.2s;
        }
        .order-card.pending { border-left: 4px solid #ffc107; }
        .order-card.processing { border-left: 4px solid #17a2b8; }
        .order-card.completed { border-left: 4px solid #28a745; }
        .order-card.cancelled { border-left: 4px solid #dc3545; }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .order-product {
            font-size: 1rem;
            font-weight: bold;
            color: #ffd700;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .status-pending { background: #ffc107; color: #1a1a2e; }
        .status-processing { background: #17a2b8; color: white; }
        .status-completed { background: #28a745; color: white; }
        .status-cancelled { background: #dc3545; color: white; }
        .order-details {
            font-size: 0.75rem;
            opacity: 0.85;
            margin-top: 10px;
        }
        .order-details p { 
            margin: 6px 0; 
            display: flex; 
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 5px;
        }
        .order-details .label { opacity: 0.6; }
        .order-details .value { font-weight: 500; color: #ffd700; }
        .history-id {
            font-family: monospace;
            font-size: 0.7rem;
        }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 40px;
            font-weight: 600;
            color: #ffd700;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-refresh {
            background: rgba(255,215,0,0.2);
            border: 1px solid #ffd700;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #ffd700;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
        }
        .empty-state i {
            font-size: 3rem;
            opacity: 0.3;
            margin-bottom: 16px;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,215,0,0.3);
            border-top: 3px solid #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.7rem;
            opacity: 0.5;
        }
        .auto-refresh-info {
            text-align: center;
            font-size: 0.65rem;
            opacity: 0.5;
            margin-bottom: 15px;
        }
        .queue-badge-small {
            background: #ff5722;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-box"></i> Pesanan Saya</h1>
            <p>Riwayat dan status pesanan joki Anda</p>
        </div>

        <div class="auto-refresh-info">
            <i class="fas fa-sync-alt"></i> Data otomatis update setiap 10 detik
            <button class="btn-refresh" onclick="manualRefresh()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>

        <div id="ordersList"></div>

        <button class="btn-secondary" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Kembali ke Beranda
        </button>

        <footer>
            <i class="fas fa-shield-alt"></i> Bizzy Impact Official
        </footer>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top:20px;">Memuat pesanan...</p>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyBUHSGJ2Yaet7ue1x8WLcHn6LI627SINqg",
            authDomain: "rayy-digital-store.firebaseapp.com",
            databaseURL: "https://rayy-digital-store-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rayy-digital-store",
            storageBucket: "rayy-digital-store.firebasestorage.app",
            messagingSenderId: "537690791174",
            appId: "1:537690791174:web:c29f7cdfcae0506b6e1287"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUserId = localStorage.getItem("bizzy_userId");
        let currentUsername = localStorage.getItem("bizzy_username");
        let refreshInterval = null;

        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        function showToast(msg) {
            let toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = msg;
            toast.style.position = "fixed";
            toast.style.bottom = "20px";
            toast.style.left = "20px";
            toast.style.right = "20px";
            toast.style.background = "#1a1a2e";
            toast.style.padding = "12px";
            toast.style.borderRadius = "40px";
            toast.style.textAlign = "center";
            toast.style.zIndex = "2000";
            toast.style.borderLeft = "4px solid #ffd700";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function getStatusBadge(status) {
            switch(status) {
                case 'pending': return '<span class="status-badge status-pending">⏳ MENUNGGU KONFIRMASI</span>';
                case 'processing': return '<span class="status-badge status-processing">⚙️ SEDANG DI PROSES</span>';
                case 'completed': return '<span class="status-badge status-completed">✅ SELESAI</span>';
                case 'cancelled': return '<span class="status-badge status-cancelled">❌ DIBATALKAN</span>';
                default: return '<span class="status-badge status-pending">⏳ PENDING</span>';
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'pending': return 'pending';
                case 'processing': return 'processing';
                case 'completed': return 'completed';
                case 'cancelled': return 'cancelled';
                default: return 'pending';
            }
        }

        function getStatusText(status) {
            switch(status) {
                case 'pending': return 'Menunggu Konfirmasi Admin';
                case 'processing': return 'Sedang Dikerjakan oleh Admin';
                case 'completed': return 'Pesanan Selesai! Terima kasih 🙏';
                case 'cancelled': return 'Pesanan Dibatalkan';
                default: return 'Menunggu Konfirmasi';
            }
        }

        async function loadOrders() {
            if (!currentUserId) {
                document.getElementById('ordersList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-lock"></i>
                        <p>Silakan login terlebih dahulu untuk melihat pesanan Anda</p>
                        <button class="btn-secondary" onclick="window.location.href='index.html'">Login Sekarang</button>
                    </div>
                `;
                return;
            }

            showLoading();

            try {
                const ordersRef = ref(db, 'bizzy_orders');
                const snapshot = await get(ordersRef);
                const orders = snapshot.val();

                if (!orders) {
                    document.getElementById('ordersList').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>Belum ada pesanan</p>
                            <p style="font-size:0.7rem; margin-top:8px;">Silakan order joki terlebih dahulu</p>
                            <button class="btn-secondary" onclick="window.location.href='index.html'">Order Sekarang</button>
                        </div>
                    `;
                    hideLoading();
                    return;
                }

                // Filter pesanan berdasarkan userId yang login
                const userOrders = Object.entries(orders)
                    .filter(([id, order]) => order.userId === currentUserId)
                    .sort((a, b) => new Date(b[1].createdAt) - new Date(a[1].createdAt));

                if (userOrders.length === 0) {
                    document.getElementById('ordersList').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>Belum ada pesanan</p>
                            <p style="font-size:0.7rem; margin-top:8px;">Silakan order joki terlebih dahulu</p>
                            <button class="btn-secondary" onclick="window.location.href='index.html'">Order Sekarang</button>
                        </div>
                    `;
                    hideLoading();
                    return;
                }

                let html = '';
                for (const [id, order] of userOrders) {
                    const statusClass = getStatusClass(order.status);
                    const statusBadge = getStatusBadge(order.status);
                    const statusText = getStatusText(order.status);
                    
                    // Tentukan warna untuk queue number
                    let queueHtml = '';
                    if (order.queueNumber) {
                        queueHtml = `<span class="queue-badge-small"><i class="fas fa-hourglass-half"></i> Antrian ke-${order.queueNumber}</span>`;
                    }
                    
                    html += `
                        <div class="order-card ${statusClass}">
                            <div class="order-header">
                                <span class="order-product"><i class="fas fa-gamepad"></i> ${escapeHtml(order.productName)}</span>
                                <div style="display: flex; gap: 8px; align-items: center;">
                                    ${queueHtml}
                                    ${statusBadge}
                                </div>
                            </div>
                            <div class="order-details">
                                <p><span class="label">📅 Tanggal Order:</span> <span class="value">${new Date(order.createdAt).toLocaleString()}</span></p>
                                <p><span class="label">💰 Total Bayar:</span> <span class="value">Rp ${order.productPrice?.toLocaleString() || 0}</span></p>
                                <p><span class="label">🆔 ID Transaksi:</span> <span class="value history-id">${order.transactionId || '-'}</span></p>
                                <p><span class="label">📱 WhatsApp:</span> <span class="value">${escapeHtml(order.phoneNumber || '-')}</span></p>
                                <p><span class="label">📊 Status:</span> <span class="value">${statusText}</span></p>
                                ${order.proofLink ? `<p><span class="label">🔗 Bukti Transfer:</span> <span class="value"><a href="${escapeHtml(order.proofLink)}" target="_blank" style="color:#ffd700;">Lihat Bukti</a></span></p>` : ''}
                                ${order.notes ? `<p><span class="label">📝 Catatan:</span> <span class="value">${escapeHtml(order.notes)}</span></p>` : ''}
                                ${order.processedBy ? `<p><span class="label">👨‍💼 Diproses oleh:</span> <span class="value">${escapeHtml(order.processedBy)}</span></p>` : ''}
                                ${order.updatedAt && order.status !== 'pending' ? `<p><span class="label">⏰ Update Terakhir:</span> <span class="value">${new Date(order.updatedAt).toLocaleString()}</span></p>` : ''}
                            </div>
                            ${order.status === 'completed' ? `
                            <div style="margin-top: 12px; padding: 10px; background: rgba(40,167,69,0.2); border-radius: 12px; text-align: center;">
                                <i class="fas fa-check-circle"></i> Terima kasih telah menggunakan jasa Bizzy Impact!
                            </div>
                            ` : ''}
                            ${order.status === 'pending' ? `
                            <div style="margin-top: 12px; padding: 10px; background: rgba(255,193,7,0.1); border-radius: 12px; text-align: center;">
                                <i class="fas fa-clock"></i> Pesanan sedang menunggu konfirmasi admin. Mohon bersabar.
                            </div>
                            ` : ''}
                            ${order.status === 'processing' ? `
                            <div style="margin-top: 12px; padding: 10px; background: rgba(23,162,184,0.1); border-radius: 12px; text-align: center;">
                                <i class="fas fa-spinner fa-pulse"></i> Pesanan sedang dikerjakan oleh admin. Status akan diupdate jika sudah selesai.
                            </div>
                            ` : ''}
                        </div>
                    `;
                }
                
                document.getElementById('ordersList').innerHTML = html;
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('ordersList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color: #dc3545;"></i>
                        <p>Gagal memuat pesanan</p>
                        <button class="btn-secondary" onclick="location.reload()">Coba Lagi</button>
                    </div>
                `;
            } finally {
                hideLoading();
            }
        }

        function manualRefresh() {
            showToast("🔄 Memuat ulang data...");
            loadOrders();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // Auto refresh setiap 10 detik
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (currentUserId) {
                    loadOrders();
                }
            }, 10000);
        }

        // Cek login dan load data
        if (!currentUserId || !currentUsername) {
            document.getElementById('ordersList').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-lock"></i>
                    <p>Silakan login terlebih dahulu untuk melihat pesanan Anda</p>
                    <button class="btn-secondary" onclick="window.location.href='index.html'">Login Sekarang</button>
                </div>
            `;
        } else {
            loadOrders();
            startAutoRefresh();
        }

        window.goBack = goBack;
        window.manualRefresh = manualRefresh;
    </script>
</body>
</html>

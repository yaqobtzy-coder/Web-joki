<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Customer Service | Bizzy Impact Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style id="theme-style">
        :root {
            --primary-color: #1e88e5;
            --primary-dark: #0d47a1;
            --primary-light: #42a5f5;
            --accent-color: #ffd700;
            --accent-dark: #ff8c00;
            --bg-light: #ffffff;
            --bg-card: rgba(255,255,255,0.8);
            --text-dark: #1a2a6c;
            --text-light: #2c3e8f;
        }
    </style>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #e6edfc);
            color: var(--text-dark);
            min-height: 100vh;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.3);
            z-index: -1;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(30,136,229,0.3);
        }
        .header h1 {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .admin-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .admin-card {
            flex: 1;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .admin-card.active {
            border-color: var(--primary-color);
            background: rgba(30,136,229,0.1);
        }
        .admin-card i {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        .admin-card .admin-name {
            font-weight: bold;
        }
        .admin-card .admin-phone {
            font-size: 0.7rem;
            opacity: 0.7;
        }
        
        .chat-container {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            height: 60vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid rgba(30,136,229,0.2);
        }
        .chat-header {
            padding: 14px 16px;
            background: rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(30,136,229,0.2);
            text-align: center;
            font-weight: bold;
            color: var(--primary-dark);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .chat-message.own {
            background: linear-gradient(95deg, var(--primary-color), var(--primary-dark));
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: white;
        }
        .chat-message.other {
            background: rgba(0,0,0,0.05);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: var(--text-dark);
        }
        .chat-username {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .chat-time {
            font-size: 0.6rem;
            opacity: 0.5;
            text-align: right;
            margin-top: 4px;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 16px;
            background: rgba(0,0,0,0.03);
            border-top: 1px solid rgba(30,136,229,0.2);
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0,0,0,0.05);
            border: 1px solid rgba(30,136,229,0.3);
            border-radius: 30px;
            color: var(--text-dark);
        }
        .chat-input-area button {
            background: var(--primary-color);
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        
        .btn-wa {
            background: linear-gradient(95deg, #25D366, #128C7E);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
        }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--primary-color);
            border-radius: 40px;
            font-weight: 600;
            color: var(--primary-color);
            cursor: pointer;
            margin-top: 10px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--bg-light);
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            z-index: 2000;
            border-left: 4px solid var(--primary-color);
            color: var(--primary-dark);
        }
        .typing-indicator {
            font-size: 0.7rem;
            opacity: 0.5;
            padding: 5px 16px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-headset"></i> Customer Service</h1>
            <p>Live Chat dengan Admin</p>
        </div>

        <div class="admin-selector">
            <div class="admin-card active" data-admin="admin1" data-phone="6281772352832">
                <i class="fas fa-user-tie"></i>
                <div class="admin-name">Admin 1</div>
                <div class="admin-phone">+62 817-7235-2832</div>
            </div>
            <div class="admin-card" data-admin="admin2" data-phone="6285794545996">
                <i class="fas fa-user-tie"></i>
                <div class="admin-name">Admin 2</div>
                <div class="admin-phone">+62 857-9454-5996</div>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <i class="fas fa-comments"></i> Live Chat - <span id="chatTargetName">Admin 1</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div style="text-align:center; padding:20px;">
                    <i class="fas fa-spinner fa-pulse"></i> Memuat chat...
                </div>
            </div>
            <div class="typing-indicator" id="typingIndicator"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Ketik pesan...">
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <button class="btn-wa" id="whatsappBtn">
            <i class="fab fa-whatsapp"></i> Hubungi via WhatsApp
        </button>
        <button class="btn-secondary" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Kembali
        </button>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyBUHSGJ2Yaet7ue1x8WLcHn6LI627SINqg",
            authDomain: "rayy-digital-store.firebaseapp.com",
            databaseURL: "https://rayy-digital-store-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rayy-digital-store",
            storageBucket: "rayy-digital-store.firebasestorage.app",
            messagingSenderId: "537690791174",
            appId: "1:537690791174:web:c29f7cdfcae0506b6e1287"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, update } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function loadCustomTheme() {
            const themeRef = ref(db, 'bizzy_settings/theme');
            const snapshot = await get(themeRef);
            const theme = snapshot.val();
            if (theme) {
                const styleTag = document.getElementById('theme-style');
                if (styleTag) {
                    styleTag.innerHTML = `
                        :root {
                            --primary-color: ${theme.primaryColor || '#1e88e5'};
                            --primary-dark: ${theme.primaryDark || '#0d47a1'};
                            --primary-light: ${theme.primaryLight || '#42a5f5'};
                            --accent-color: ${theme.accentColor || '#ffd700'};
                            --accent-dark: ${theme.accentDark || '#ff8c00'};
                            --bg-light: #ffffff;
                            --bg-card: rgba(255,255,255,0.8);
                            --text-dark: #1a2a6c;
                            --text-light: #2c3e8f;
                        }
                    `;
                }
            }
        }

        let currentUserId = localStorage.getItem("bizzy_userId");
        let currentUsername = localStorage.getItem("bizzy_username");
        let selectedAdmin = "admin1";
        let selectedAdminPhone = "6281772352832";
        let chatRef = null;
        let typingTimeout = null;

        function showToast(msg) {
            let toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.querySelectorAll('.admin-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.admin-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedAdmin = card.getAttribute('data-admin');
                selectedAdminPhone = card.getAttribute('data-phone');
                document.getElementById('chatTargetName').innerText = selectedAdmin === 'admin1' ? 'Admin 1' : 'Admin 2';
                loadChat();
            });
        });

        function loadChat() {
            if (!currentUserId) {
                document.getElementById('chatMessages').innerHTML = `
                    <div style="text-align:center; padding:20px;">
                        <i class="fas fa-lock"></i> Silakan login terlebih dahulu
                    </div>
                `;
                return;
            }

            const chatRoomId = `chat_${currentUserId}_${selectedAdmin}`;
            chatRef = ref(db, `bizzy_chats/${chatRoomId}/messages`);
            
            onValue(chatRef, (snapshot) => {
                const messages = snapshot.val();
                const container = document.getElementById('chatMessages');
                
                if (!messages) {
                    container.innerHTML = '<div style="text-align:center; padding:20px;">Belum ada pesan. Mulai chat sekarang!</div>';
                    return;
                }
                
                const msgs = Object.values(messages).sort((a,b) => a.timestamp - b.timestamp);
                container.innerHTML = msgs.map(msg => `
                    <div class="chat-message ${msg.senderId === currentUserId ? 'own' : 'other'}">
                        <div class="chat-username">${escapeHtml(msg.senderName)} ${msg.senderId === currentUserId ? '(Anda)' : '(Admin)'}</div>
                        <div>${escapeHtml(msg.text)}</div>
                        <div class="chat-time">${new Date(msg.timestamp).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>
                `).join('');
                
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendMessage = function() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            
            if (!text) return;
            if (!currentUserId) {
                showToast("Silakan login terlebih dahulu!");
                return;
            }
            
            const chatRoomId = `chat_${currentUserId}_${selectedAdmin}`;
            const messageRef = ref(db, `bizzy_chats/${chatRoomId}/messages`);
            
            push(messageRef, {
                senderId: currentUserId,
                senderName: currentUsername || 'User',
                text: text,
                timestamp: Date.now(),
                read: false
            });
            
            update(ref(db, `bizzy_chats/${chatRoomId}`), {
                lastMessage: text,
                lastMessageTime: Date.now(),
                lastSender: currentUsername,
                unreadAdmin: true
            });
            
            input.value = '';
            
            fetch(`https://api.telegram.org/bot8352764997:AAEP5JE2llOvuoNFoJvDlATOl2Mrzo4VZ-M/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: '7966336512',
                    text: `💬 *PESAN BARU DI CS*\n\n👤 User: ${currentUsername}\n📨 Pesan: ${text}\n👨‍💼 Admin: ${selectedAdmin === 'admin1' ? 'Admin 1' : 'Admin 2'}`,
                    parse_mode: 'Markdown'
                })
            }).catch(e => console.log);
        };

        document.getElementById('chatInput')?.addEventListener('input', () => {
            if (!currentUserId) return;
            const chatRoomId = `chat_${currentUserId}_${selectedAdmin}`;
            set(ref(db, `bizzy_chats/${chatRoomId}/typing`), {
                isTyping: true,
                username: currentUsername,
                timestamp: Date.now()
            });
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                set(ref(db, `bizzy_chats/${chatRoomId}/typing`), null);
            }, 2000);
        });

        function listenTyping() {
            if (!currentUserId) return;
            const chatRoomId = `chat_${currentUserId}_${selectedAdmin}`;
            onValue(ref(db, `bizzy_chats/${chatRoomId}/typing`), (snapshot) => {
                const typing = snapshot.val();
                const indicator = document.getElementById('typingIndicator');
                if (typing && typing.isTyping && typing.username !== currentUsername) {
                    indicator.innerHTML = `${escapeHtml(typing.username)} sedang mengetik...`;
                } else {
                    indicator.innerHTML = '';
                }
            });
        }

        document.getElementById('whatsappBtn')?.addEventListener('click', () => {
            const message = `Halo Admin Bizzy Impact, saya ${currentUsername || 'User'} mau bertanya tentang jasa joki.`;
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/${selectedAdminPhone}?text=${encodedMessage}`, '_blank');
        });

        function goBack() {
            window.location.href = 'index.html';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        await loadCustomTheme();

        if (!currentUserId || !currentUsername) {
            document.getElementById('chatMessages').innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <i class="fas fa-lock"></i> Silakan login terlebih dahulu<br>
                    <button class="btn-secondary" onclick="window.location.href='index.html'" style="margin-top:10px;">Login Sekarang</button>
                </div>
            `;
            document.getElementById('chatInput').disabled = true;
        } else {
            loadChat();
            listenTyping();
        }

        window.goBack = goBack;
        window.sendMessage = sendMessage;
    </script>
</body>
</html>
